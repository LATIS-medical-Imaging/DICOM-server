name: dicom-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: dicom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dicom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dicom}
      POSTGRES_DB: ${POSTGRES_DB:-dicom}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dicom} -d ${POSTGRES_DB:-dicom}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dicom-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER:-dicom}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dicom}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-dicom}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: dicom-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: dicom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dicom-server:latest
    container_name: dicom-api
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    networks:
      - backend

  worker:
    image: dicom-server:latest
    container_name: dicom-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - .env
    depends_on:
      - api
      - redis
      - postgres
    networks:
      - backend

  tools:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: dicom-server-dev:latest
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - backend

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  backend:
    driver: bridge
